services:
  web:
    build: .
    container_name: assignment3_web
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=assignment3db
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: assignment3_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: